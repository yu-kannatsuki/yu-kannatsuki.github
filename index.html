<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏月 結 公式小説サイト</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            line-height: 1.8;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        header {
            text-align: center;
            border-bottom: 1px solid #333;
            padding-bottom: 30px;
            margin-bottom: 40px;
        }
        h1 { font-size: 1.8rem; color: #ffffff; letter-spacing: 0.1em; }
        h2 { font-size: 1.4rem; color: #ffffff; border-left: 4px solid #888; padding-left: 10px; margin-top: 40px; }
        .profile { background: #242424; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        .novel-card {
            background: #242424;
            padding: 24px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        .novel-title { font-size: 1.3rem; margin-top: 0; }
        .novel-title a { color: #4da6ff; text-decoration: none; }
        .novel-title a:hover { text-decoration: underline; }
        .tag { display: inline-block; background: #333; padding: 2px 8px; font-size: 0.8rem; border-radius: 4px; margin-right: 5px; }
        .synopsis { font-size: 0.95rem; color: #b0b0b0; margin-top: 15px; }
        .sns-links a { color: #ffffff; margin-right: 15px; text-decoration: none; font-weight: bold; }
        .sns-links a:hover { color: #4da6ff; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>夏月 結 公式サイト</h1>
            <p>Web小説を執筆しています。</p>
        </header>

        <section class="profile">
            <h2>Profile</h2>
            <p>ここに簡単な自己紹介を書いてください。執筆傾向や、更新頻度などを書くと読者に親切です。</p>
            <div class="sns-links">
                <a href="https://x.com/yu_kannatsuki" target="_blank">X（旧Twitter）</a>
            </div>
        </section>

        <section class="novel-list">
            <h2>Works（作品一覧）</h2>
            
            <div class="novel-card">
                <h3 class="novel-title"><a href="story1.html">ここに作品のタイトルが入ります</a></h3>
                <div>
                    <span class="tag">短編</span><span class="tag">ファンタジー</span>
                </div>
                <p class="synopsis">
                    ここに作品のあらすじが入ります。SNSでシェアされたときに「読んでみたい！」と思ってもらえるような、魅力的な紹介文を書きましょう。
                </p>
            </div>

        </section>
    </div>

</body>
</html>
